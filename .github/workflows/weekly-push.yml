name: Push weekly picks to Telegram

# 每周日云端 routine 生成「本周选题TOP10 + 一周AI串烧初稿」推到 main 后，
# 本 Action 把两份文档发到 Telegram。Token 用仓库 Secret，绝不进代码。
on:
  push:
    branches: [main]
    paths:
      - '周报/**'
  workflow_dispatch:

concurrency:
  group: weekly-push
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send weekly docs to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "未配置 TELEGRAM secrets，跳过"; exit 0
          fi
          WEEK=$(ls -d 周报/*/ 2>/dev/null | sort | tail -1 | sed 's#周报/##; s#/##')
          if [ -z "$WEEK" ]; then echo "无周报产物，跳过"; exit 0; fi
          echo "推送周报: $WEEK"
          if [ -f "周报/$WEEK/本周选题TOP10.md" ]; then
            python3 scripts/send_telegram.py --file "周报/$WEEK/本周选题TOP10.md" \
              --text "🗓 <b>本周选题 TOP10</b>（$WEEK）——基于一周 AI 早报素材，按爆款选题评分框架排序"
          fi
          if [ -f "周报/$WEEK/一周AI串烧初稿.md" ]; then
            python3 scripts/send_telegram.py --file "周报/$WEEK/一周AI串烧初稿.md" \
              --text "🎬 <b>一周 AI 大事串烧 · 口播初稿</b>（$WEEK）——形态B高密度快串，【】锚点可直接喂分镜"
          fi

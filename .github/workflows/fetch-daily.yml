name: Fetch AI hotspot sources (daily)

# 每天在 GitHub Actions 的 Ubuntu 虚拟机上跑抓取脚本（完整公网出站，免费），
# 把 items.json 提交进仓库 —— 云端 routine 的沙箱没有公网出站（仅 github.com 放行），
# 所以抓取由这里代劳，routine 只读仓库里的 items.json 做整理。
on:
  schedule:
    # GitHub cron 是尽力而为,三班次同一天(07-13/07-14)被连续观测到延迟 3+ 小时,
    # 说明"多加几班 schedule"治标不治本——GitHub 高峰期是把整个 schedule 队列一起delay,
    # 不是单班次偶发。保留三班次做"运气好时更早"的尝试,但不再是唯一触发路径。
    - cron: '35 2 * * *'   # 02:35 UTC = 06:35 GST = 10:35 北京
    - cron: '55 2 * * *'   # 第二班
    - cron: '15 3 * * *'   # 第三班(仍早于日报 routine 03:30 UTC)
  push:
    # 主触发路径的兜底:push 事件不受 schedule 队列延迟影响,通常几十秒内起跑。
    # 日报 routine 发现 items.json 未就绪时,会主动更新并 push 这个标记文件来即时唤起本工作流。
    # 路径限定到标记文件本身,不会被下面"Commit results"步骤(只 add 待审核/$DATE/)误触发,不会自循环。
    branches: [main]
    paths:
      - '.github/fetch-trigger'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fetch (stdlib-only, 25 sources)
        run: |
          python3 --version
          # exit 2（超60%源失败）也继续提交失败产物供云端诊断，不让流程假装成功
          python3 scripts/fetch_all.py || echo "::warning::fetch 脚本非零退出（部分/全部源失败），产物照常提交"

      - name: Commit results
        run: |
          DATE=$(TZ=Asia/Shanghai date +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "待审核/$DATE/" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无新产物（当日已存在或抓取全失败且无文件），跳过提交"
            exit 0
          fi
          git commit -m "fetch: 待审核/$DATE 抓取产物 (GitHub Actions)"
          git pull --rebase origin main
          git push origin main
